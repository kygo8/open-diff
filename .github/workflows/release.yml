name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  create-release:
    name: Create release
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.release.outputs.release_id }}

    steps:
      - name: Create or find release
        id: release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          api="https://api.github.com/repos/${GH_REPO}/releases"
          auth_header="Authorization: Bearer ${GH_TOKEN}"
          accept_header="Accept: application/vnd.github+json"
          version_header="X-GitHub-Api-Version: 2022-11-28"

          node <<'NODE' > release-payload.json
          const tag = process.env.TAG_NAME
          const prerelease = /-(alpha|beta|rc)/.test(tag)

          process.stdout.write(JSON.stringify({
            tag_name: tag,
            name: `Open Diff ${tag}`,
            body: 'See the assets below to download and install Open Diff for your platform.',
            draft: false,
            prerelease,
            generate_release_notes: true,
          }))
          NODE

          status="$(
            curl --silent --show-error \
              --output release.json \
              --write-out "%{http_code}" \
              --request POST \
              --header "${auth_header}" \
              --header "${accept_header}" \
              --header "${version_header}" \
              --header "Content-Type: application/json" \
              --data @release-payload.json \
              "${api}"
          )"

          if [[ "${status}" == "422" ]]; then
            curl --silent --show-error \
              --output releases.json \
              --header "${auth_header}" \
              --header "${accept_header}" \
              --header "${version_header}" \
              "${api}?per_page=100"

            node <<'NODE' > release.json
          const fs = require('fs')
          const tag = process.env.TAG_NAME
          const releases = JSON.parse(fs.readFileSync('releases.json', 'utf8'))
          const release = releases.find((item) => item.tag_name === tag && !item.draft)
            ?? releases.find((item) => item.tag_name === tag)

          if (!release) {
            console.error(`No existing release found for ${tag}`)
            process.exit(1)
          }

          process.stdout.write(JSON.stringify(release))
          NODE
          elif [[ "${status}" != "201" ]]; then
            cat release.json
            exit 1
          fi

          release_id="$(node -e "const fs = require('fs'); const release = JSON.parse(fs.readFileSync('release.json', 'utf8')); console.log(release.id || '')")"
          if [[ -z "${release_id}" ]]; then
            cat release.json
            exit 1
          fi

          echo "release_id=${release_id}" >> "${GITHUB_OUTPUT}"

  publish-tauri:
    name: Build and publish (${{ matrix.platform }})
    needs: create-release
    runs-on: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
            rust-target: aarch64-apple-darwin
          - platform: macos-latest
            args: --target x86_64-apple-darwin
            rust-target: x86_64-apple-darwin
          - platform: ubuntu-22.04
            args: ''
            rust-target: ''
          - platform: windows-latest
            args: ''
            rust-target: ''

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v6.0.9
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          target: ${{ matrix.rust-target }}
          cache-workspaces: src-tauri

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev patchelf rpm

      - name: Install frontend dependencies
        run: corepack pnpm install --frozen-lockfile

      - name: Build and upload Tauri bundles
        uses: tauri-apps/tauri-action@action-v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}
          tagName: ${{ github.ref_name }}
          releaseName: Open Diff ${{ github.ref_name }}
          releaseBody: |
            See the assets below to download and install Open Diff for your platform.
          generateReleaseNotes: true
          releaseDraft: false
          prerelease: ${{ contains(github.ref_name, '-alpha') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-rc') }}
          tauriScript: corepack pnpm tauri
          args: ${{ matrix.args }}
          assetNamePattern: '[name]_[version]_[platform]_[arch][setup][ext]'
          retryAttempts: 2
